name: Bank Soundness Monitor CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-size: '20'
        cache: 'npm'

    - name: Install Node Dependencies
      run: npm install

    - name: Compile and Build Web App
      run: npm run build

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Compile Excel Supervisory Report
      run: python scripts/build_report.py

    - name: Archive Excel Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: bank-soundness-supervisory-report
        path: reports/bank_soundness_report_q3fy26.xlsx
        retention-days: 14

